services:
  # ── Backend FastAPI ──────────────────────────────────────────────────────────
  - type: web
    name: object-finder-api
    runtime: python
    region: frankfurt          # plus proche de la Tunisie
    plan: free

    # Commande de build — installe les dépendances + télécharge les modèles
    buildCommand: pip install -r requirements.txt && python download_models.py

    # Commande de démarrage
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT

    # Variables d'environnement — à configurer dans le dashboard Render
    envVars:
      - key: MODEL_YOLO_URL
        value: https://github.com/ultralytics/assets/releases/download/v0.0.0/yolov8n.pt

      - key: MODEL_CNN_PERSON_URL
        value: "https://drive.google.com/file/d/12iyiWnD-6k120jBezuOZqAWm1zMdiUoH/view?usp=drive_link"

      - key: MODEL_YOLO_STAIRS_URL
        value: "https://drive.google.com/file/d/1Z4cNAu4ku-_RPK7HL5nCs6Ih-gYeMtBU/view?usp=drive_link" 
      - key: MODEL_CNN_STAIRS_URL
        value: "https://drive.google.com/file/d/1wbcLE6b1Ws2vWabDutUXTKhhgwSRa-pQ/view?usp=drive_link" 
